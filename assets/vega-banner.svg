<svg xmlns="http://www.w3.org/2000/svg" width="600" height="250">
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0" stop-color="#ff0000">
          <animate attributeName="stop-color" values="#ff0000; #ff7f00; #ffff00; #00ff00; #0000ff; #4b0082; #8b00ff; #ff0000" dur="2s" repeatCount="indefinite" />
        </stop>
        <stop offset="0.25" stop-color="#ff7f00">
           <animate attributeName="stop-color" values="#ffff00; #00ff00; #0000ff; #4b0082; #8b00ff; #ff0000; #ff7f00; #ffff00" dur="2s" repeatCount="indefinite" />
        </stop>
        <stop offset="0.5" stop-color="#ffff00">
           <animate attributeName="stop-color" values="#0000ff; #4b0082; #8b00ff; #ff0000; #ff7f00; #ffff00; #00ff00; #0000ff" dur="2s" repeatCount="indefinite" />
        </stop>
        <stop offset="0.75" stop-color="#00ff00">
           <animate attributeName="stop-color" values="#8b00ff; #ff0000; #ff7f00; #ffff00; #00ff00; #0000ff; #4b0082; #8b00ff" dur="2s" repeatCount="indefinite" />
        </stop>
        <stop offset="1" stop-color="#0000ff">
           <animate attributeName="stop-color" values="#ff0000; #ff7f00; #ffff00; #00ff00; #0000ff; #4b0082; #8b00ff; #ff0000" dur="2s" repeatCount="indefinite" />
        </stop>
    </linearGradient>
  </defs>

  <g fill="url(#rainbow)">
    <text x="50%" y="10%" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" dominant-baseline="middle" xml:space="preserve">
       <tspan x="50%" dy="25">██╗   ██╗███████╗ ██████╗  █████╗</tspan>
       <tspan x="50%" dy="25">██║   ██║██╔════╝██╔════╝ ██╔══██╗</tspan>
       <tspan x="50%" dy="25">██║   ██║█████╗  ██║  ███╗███████║</tspan>
       <tspan x="50%" dy="25">╚██╗ ██╔╝██╔══╝  ██║   ██║██╔══██║</tspan>
       <tspan x="50%" dy="25"> ╚████╔╝ ███████╗╚██████╔╝██║  ██║</tspan>
       <tspan x="50%" dy="25">  ╚═══╝  ╚══════╝ ╚═════╝ ╚═╝  ╚═╝</tspan>
    </text>
  </g>
  <text x="50%" y="200" font-family="monospace" text-anchor="middle" dominant-baseline="middle" fill="#a3b3cc" font-size="16">Versatile Engineering &amp; General Automation</text>
  <text x="50%" y="225" font-family="monospace" text-anchor="middle" dominant-baseline="middle" fill="#a3b3cc" font-size="16">Command Line Tool</text>
</svg>
